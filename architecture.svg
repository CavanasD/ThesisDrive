<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 800" width="860" height="800">
  <defs>
    <marker id="aBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#388bfd"/>
    </marker>
    <marker id="aOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f0883e"/>
    </marker>
    <marker id="aCyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#79c0ff"/>
    </marker>
    <marker id="aPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#bc8cff"/>
    </marker>
    <marker id="aGreen" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#3fb950"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="800" fill="#0d1117"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" font-family="monospace" font-size="15" fill="#e6edf3" font-weight="bold">系统架构图 — Nginx + TLS 部署</text>

  <!-- ═══ Browser ═══ -->
  <rect x="295" y="48" width="270" height="75" rx="8" fill="#161b22" stroke="#388bfd" stroke-width="1.5"/>
  <text x="430" y="72" text-anchor="middle" font-family="monospace" font-size="13" fill="#388bfd" font-weight="bold">用户浏览器</text>
  <text x="430" y="90" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Vue 3 SPA（静态资源由 Nginx 托管）</text>
  <text x="430" y="108" text-anchor="middle" font-family="monospace" font-size="10" fill="#6e7681">原设计：AES-CFB8 JS 客户端解密</text>

  <!-- Internet boundary -->
  <line x1="50" y1="148" x2="810" y2="148" stroke="#30363d" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="56" y="143" font-family="monospace" font-size="10" fill="#484f58">公网</text>
  <text x="56" y="163" font-family="monospace" font-size="10" fill="#484f58">服务器内网</text>

  <!-- Server outer box -->
  <rect x="50" y="155" width="760" height="615" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <!-- ─── Browser → Nginx arrow (HTTPS/WSS) ─── -->
  <line x1="430" y1="123" x2="430" y2="195" stroke="#388bfd" stroke-width="1.5" marker-end="url(#aBlue)"/>
  <text x="440" y="155" font-family="monospace" font-size="10" fill="#388bfd">HTTPS :10086</text>
  <text x="440" y="168" font-family="monospace" font-size="10" fill="#388bfd">WSS :10086/ws</text>

  <!-- ═══ Nginx ═══ -->
  <rect x="215" y="200" width="430" height="90" rx="8" fill="#1a2f1a" stroke="#3fb950" stroke-width="1.5"/>
  <text x="430" y="225" text-anchor="middle" font-family="monospace" font-size="13" fill="#3fb950" font-weight="bold">Nginx  (SSL 终止 · 反向代理)</text>
  <text x="430" y="244" text-anchor="middle" font-family="monospace" font-size="10" fill="#7ee787">Listen :10086 (HTTPS/WSS)  ·  静态资源托管 /dist</text>
  <text x="430" y="261" text-anchor="middle" font-family="monospace" font-size="10" fill="#56d364">location /ws  →  proxy_pass 127.0.0.1:10085 (Carapace)</text>
  <text x="430" y="278" text-anchor="middle" font-family="monospace" font-size="10" fill="#56d364">timeout 86400s  ·  gzip 压缩  ·  SPA fallback</text>

  <!-- Static files dashed arrow (Nginx → Browser, left side) -->
  <path d="M 215 240 C 130 240 130 85 295 85" stroke="#3fb950" stroke-width="1" stroke-dasharray="5,3" fill="none" marker-end="url(#aGreen)"/>
  <text x="68" y="185" font-family="monospace" font-size="9" fill="#3fb950">静态文件</text>
  <text x="68" y="198" font-family="monospace" font-size="9" fill="#3fb950">HTML/CSS/JS</text>

  <!-- ─── Nginx → Carapace arrow ─── -->
  <line x1="430" y1="290" x2="430" y2="338" stroke="#f0883e" stroke-width="1.5" marker-end="url(#aOrange)"/>
  <text x="440" y="319" font-family="monospace" font-size="10" fill="#f0883e">WSS 127.0.0.1:10085  (内网)</text>

  <!-- ═══ Carapace WAF ═══ -->
  <rect x="110" y="343" width="640" height="135" rx="8" fill="#2a1a08" stroke="#f0883e" stroke-width="1.5"/>
  <text x="430" y="368" text-anchor="middle" font-family="monospace" font-size="13" fill="#f0883e" font-weight="bold">Carapace  (SpringBoot / Java 21)  :10085</text>
  <text x="430" y="387" text-anchor="middle" font-family="monospace" font-size="10" fill="#d29922">WebSocket 反向代理  ·  JWT 认证  ·  WAF 规则引擎  ·  SSE 事件推送</text>
  <text x="430" y="404" text-anchor="middle" font-family="monospace" font-size="10" fill="#d29922">防御规则（可运行时开关）: SQL注入 · XSS · 路径穿越 · 命令注入 · 文件类型</text>
  <text x="430" y="421" text-anchor="middle" font-family="monospace" font-size="10" fill="#d29922">漏洞开关（演示用）: SSRF · JWT alg=none · CORS 错误配置 · Log4Shell</text>

  <!-- WARNING banner inside Carapace -->
  <rect x="130" y="432" width="600" height="34" rx="5" fill="#3d1010" stroke="#f85149" stroke-width="1.2"/>
  <text x="430" y="449" text-anchor="middle" font-family="monospace" font-size="10" fill="#f85149" font-weight="bold">⚠ CfmsDownloadDecryptor：文件在此 AES-CFB8 解密（JVM 侧）</text>
  <text x="430" y="462" text-anchor="middle" font-family="monospace" font-size="10" fill="#f85149">服务器持有密钥 → 明文经 HTTPS 下发客户端 → 原 E2E 设计意图失效</text>

  <!-- ─── Carapace → CFMS arrow ─── -->
  <line x1="430" y1="478" x2="430" y2="525" stroke="#79c0ff" stroke-width="1.5" marker-end="url(#aCyan)"/>
  <text x="440" y="506" font-family="monospace" font-size="10" fill="#79c0ff">WSS localhost:5104  (TLS · 不对外暴露)</text>

  <!-- ═══ CFMS ═══ -->
  <rect x="140" y="530" width="580" height="120" rx="8" fill="#0c1d38" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="430" y="556" text-anchor="middle" font-family="monospace" font-size="13" fill="#79c0ff" font-weight="bold">CFMS  (Python WebSocket Server)  :5104</text>
  <text x="430" y="575" text-anchor="middle" font-family="monospace" font-size="10" fill="#58a6ff">保密文件管理系统  ·  认证与权限  ·  文件分块传输（2 MB/块）</text>
  <text x="430" y="592" text-anchor="middle" font-family="monospace" font-size="10" fill="#58a6ff">AES-CFB8 加密存储  ·  SHA-256 完整性校验  ·  pluggy 插件系统</text>
  <text x="430" y="609" text-anchor="middle" font-family="monospace" font-size="10" fill="#58a6ff">Alembic 数据库迁移  ·  SQLAlchemy ORM</text>
  <text x="430" y="626" text-anchor="middle" font-family="monospace" font-size="10" fill="#3d7ebf">原设计：密钥最后下发，客户端收完整文件才能解密</text>
  <text x="430" y="642" text-anchor="middle" font-family="monospace" font-size="10" fill="#3d7ebf">现状：Carapace 层已解密，此机制对当前架构无实质保护</text>

  <!-- ─── CFMS → DB arrow ─── -->
  <line x1="430" y1="650" x2="430" y2="695" stroke="#bc8cff" stroke-width="1.5" marker-end="url(#aPurple)"/>
  <text x="440" y="677" font-family="monospace" font-size="10" fill="#bc8cff">SQLAlchemy ORM</text>

  <!-- ═══ Database ═══ -->
  <rect x="280" y="700" width="300" height="55" rx="8" fill="#1a1030" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="430" y="722" text-anchor="middle" font-family="monospace" font-size="13" fill="#bc8cff" font-weight="bold">Database</text>
  <text x="430" y="742" text-anchor="middle" font-family="monospace" font-size="10" fill="#a371f7">SQLite（默认）/ MySQL  ·  用户 · 文件元数据 · 权限 · WAF 日志</text>

  <!-- WAF Dashboard callout (right side) -->
  <rect x="685" y="350" width="115" height="50" rx="6" fill="#1c1c2e" stroke="#f0883e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="742" y="369" text-anchor="middle" font-family="monospace" font-size="9" fill="#f0883e">WAF Dashboard</text>
  <text x="742" y="383" text-anchor="middle" font-family="monospace" font-size="9" fill="#d29922">REST + SSE 实时</text>
  <text x="742" y="396" text-anchor="middle" font-family="monospace" font-size="9" fill="#d29922">事件推送</text>
  <line x1="685" y1="375" x2="750" y2="375" stroke="#f0883e" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
