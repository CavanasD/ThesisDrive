      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="24%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="56%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="82%" stop-color="#ffffff" stop-opacity="0.03"/>
